<!doctype html>
<html lang="pt-PT">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>BookMe - Software de Marcações Online | Grátis para Começar</title>
    <meta name="description" content="BookMe é o software de marcações online para salões, clínicas, restaurantes e mais. Gerencie marcações, clientes, staff e pagamentos num só lugar. Plano grátis disponível." />
    <meta name="keywords" content="software marcações, agendamentos online, booking, salão beleza, barbearia, clínica, SaaS Portugal, gestão marcações" />
    <meta name="author" content="BookMe" />
    <meta name="robots" content="index,follow" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#3B82F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="BookMe" />
    <meta name="msapplication-TileColor" content="#0F172A" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BookMe" />
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/splash/splash-640x1136.png" media="(device-width: 320px)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png" media="(device-width: 375px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-1242x2208.png" media="(device-width: 414px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-1125x2436.png" media="(device-width: 375px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bookme.pt/" />
    <meta property="og:title" content="BookMe - Software de Marcações Online" />
    <meta property="og:description" content="Software de marcações que ajuda o seu negócio a crescer. Marcações, clientes e pagamentos num só lugar. Grátis para começar." />
    <meta property="og:site_name" content="BookMe" />
    <meta property="og:locale" content="pt_PT" />
    <meta property="og:image" content="https://bookme.pt/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bookme.pt/" />
    <meta name="twitter:title" content="BookMe - Software de Marcações Online" />
    <meta name="twitter:description" content="Software de marcações que ajuda o seu negócio a crescer." />
    <meta name="twitter:image" content="https://bookme.pt/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://bookme.pt/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BookMe",
      "url": "https://bookme.pt",
      "logo": "https://bookme.pt/icons/icon-512x512.png",
      "description": "Software de marcações online para negócios de todos os tamanhos",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "suporte@bookme.pt",
        "availableLanguage": "Portuguese"
      },
      "sameAs": [
        "https://www.instagram.com/bookme",
        "https://www.linkedin.com/company/bookme",
        "https://www.facebook.com/bookme"
      ]
    }
    </script>

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BookMe",
      "description": "Software SaaS de marcações e agendamentos online para qualquer tipo de negócio",
      "url": "https://bookme.pt",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Android, iOS",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plano Grátis",
          "price": "0",
          "priceCurrency": "EUR",
          "description": "Plano grátis com marcações ilimitadas e 1 staff"
        },
        {
          "@type": "Offer",
          "name": "Plano Pro",
          "price": "14.90",
          "priceCurrency": "EUR",
          "description": "Plano Pro com WhatsApp, widget e campanhas de marketing"
        },
        {
          "@type": "Offer",
          "name": "Plano Business",
          "price": "29.90",
          "priceCurrency": "EUR",
          "description": "Plano Business com POS, relatórios avançados e API"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "47",
        "bestRating": "5",
        "worstRating": "1"
      }
    }
    </script>

    <!-- Structured Data — WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BookMe",
      "url": "https://bookme.pt",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://bookme.pt/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
