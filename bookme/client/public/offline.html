<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookMe — Sem ligação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #e2e8f0;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 20px;
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">B</div>
    <h1>Sem ligação à internet</h1>
    <p>Não foi possível carregar a página.</p>
    <p class="pulse">As suas marcações serão sincronizadas quando voltar online.</p>
    <div class="badge">A aguardar ligação...</div>
  </div>
</body>
</html>
